<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recipe Finder Dashboard</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f7f7f7;
}

header{
background:linear-gradient(135deg,#ff7e5f,#feb47b);
color:white;
text-align:center;
padding:30px;
}

.search-box{
text-align:center;
margin:20px;
}

.search-box input{
width:80%;
max-width:400px;
padding:12px;
border-radius:25px;
border:none;
box-shadow:0 2px 5px rgba(0,0,0,0.2);
}

.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
padding:20px;
}

.card{
background:white;
border-radius:15px;
overflow:hidden;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
transition:0.3s;
}

.card:hover{
transform:scale(1.03);
}

.card img{
width:100%;
height:180px;
object-fit:cover;
}

.card-content{
padding:15px;
}

.card-content h3{
margin-bottom:10px;
}

.time{
color:#ff7e5f;
font-weight:bold;
}

footer{
text-align:center;
padding:20px;
background:#333;
color:white;
margin-top:20px;
}
</style>
</head>

<body>

<header>
<h1>🍲 Recipe Finder Dashboard</h1>
<p>Discover Delicious Recipes</p>
</header>

<div class="search-box">
<input type="text" placeholder="Search Recipes...">
</div>

<div class="container">

<div class="card">
<img src="https://images.unsplash.com/photo-1513104890138-7c749659a591">
<div class="card-content">
<h3>Pizza</h3>
<p class="time">⏱ 30 Minutes</p>
</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1568901346375-23c9450c58cd">
<div class="card-content">
<h3>Burger</h3>
<p class="time">⏱ 15 Minutes</p>
</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1621996346565-e3dbc646d9a9">
<div class="card-content">
<h3>Pasta</h3>
<p class="time">⏱ 20 Minutes</p>
</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1528735602780-2552fd46c7af">
<div class="card-content">
<h3>Sandwich</h3>
<p class="time">⏱ 10 Minutes</p>
</div>
</div>

</div>

<footer>
© 2026 Recipe Finder Dashboard
</footer>

</body>
</html>
